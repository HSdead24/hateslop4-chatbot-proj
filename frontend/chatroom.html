<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>죽기 24시간 전에</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/frontend/css/chatroom.css">
</head>
<body>
<div id="app">

  <!-- ── 정보 바 (루프 → 시간 → 단서 → HP 순) ── -->
  <div id="info-bar">
    <!-- Cell 1: 루프 -->
    <div class="info-cell">
      <div class="info-label">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M4 4v5h.582m15.356 2A8 8 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8 8 0 01-15.357-2m15.357 2H15"/></svg>
        루프
      </div>
      <div class="info-value">LOOP <span id="loop-num">1</span></div>
    </div>

    <!-- Cell 2: 남은시간 -->
    <div class="info-cell">
      <div class="info-label">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
        남은시간
      </div>
      <div id="timer-display">--:--:--</div>
    </div>

    <!-- Cell 3: 단서 카운트 -->
    <div class="info-cell">
      <div class="info-label">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/></svg>
        단서
      </div>
      <div class="info-value" id="clue-info-count">0</div>
    </div>

    <!-- Cell 4: HP 생명바 (NPC별 10턴) -->
    <div class="info-cell">
      <div class="info-label">
        <svg fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
        HP
      </div>
      <div class="hp-bar-wrap">
        <div class="hp-bar-track">
          <div class="hp-bar-fill" id="hp-bar-fill"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ── 헤더 — 포트레이트(좌) + NPC정보(우) ── -->
  <div id="header">
    <!-- 대형 포트레이트 이미지 (좌측) -->
    <div class="header-portrait-wrap">
      <img id="header-portrait-img"
        src="https://res.cloudinary.com/dqu0dyn5k/image/upload/v1778595780/chat/%EC%B0%A8%EC%84%9C%EC%97%B0/%EC%B0%A8%EC%84%9C%EC%97%B0_%ED%94%84%EB%A1%9C%ED%95%84.png"
        alt="차서연"
        onerror="this.style.display='none'">
    </div>

    <!-- NPC 정보 + 컨트롤 (우측) -->
    <div class="header-info-col">
      <!-- 이름 행: 이름 + BGM 버튼 -->
      <div class="header-name-row">
        <div class="header-npc-name" id="header-npc-name">차서연</div>
        <div id="sound-toggle" class="header-sound-btn" style="cursor:pointer;">
          <svg id="sound-icon-on" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
          </svg>
          <svg id="sound-icon-off" style="display:none;" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M17 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2" />
          </svg>
        </div>
      </div>

      <!-- NPC 서브 정보 -->
      <div class="header-npc-row2">
        <span class="header-npc-sub" id="header-npc-sub">32세 · 여성</span>
        <span class="header-tag" id="header-tag">신경과 의사</span>
      </div>

      <!-- 캐릭터 전환 버튼 (우측 하단) -->
      <button class="npc-switch-btn" id="npc-switch-btn" onclick="switchNPCToggle()">
        <img id="switch-avatar-img"
          src="https://res.cloudinary.com/dqu0dyn5k/image/upload/v1778595815/chat/%EC%97%84%EB%A7%88/%EC%97%84%EB%A7%88_%ED%9B%84%ED%9B%97%20%EB%82%98%EB%8F%84%20%EB%AD%94%ED%91%9C%EC%A0%95%EC%9D%B8%EC%A7%80%EB%AA%B0%EB%9D%BC%20%ED%9B%84%ED%9B%97%20%EB%A8%B9%EA%B8%88.png"
          alt="엄마"
          onerror="this.style.display='none'">
        <div class="switch-status-dot"></div>
      </button>
    </div>
  </div>

  <!-- ── 콘텐츠 영역 (chat-scroll / clue-panel 공유) ── -->
  <div id="content-area">

    <!-- ── 채팅 스크롤 ── -->
    <div id="chat-scroll">


    </div><!-- /#chat-scroll -->

    <!-- ── 단서 패널 ── -->
    <div id="clue-panel">
      <div class="clue-panel-header">
        <div class="clue-panel-title">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/></svg>
          수집된 단서
        </div>
        <div class="clue-panel-count"><span id="clue-count">0</span>개</div>
      </div>
      <div id="clue-list">
        <div class="clue-empty">
          <div class="clue-empty-icon">🐰</div>
          <div class="clue-empty-text">치키가 알려준 단서가<br>여기에 기록됩니다.</div>
        </div>
      </div>
    </div><!-- /#clue-panel -->

  </div><!-- /#content-area -->

  <!-- ── 선택지 버튼 ── -->
  <div id="choices-area"></div>

  <!-- ── 입력창 ── -->
  <div id="input-area">
    <!-- 단서 폴더 버튼 (좌측 하단) -->
    <button id="folder-btn" onclick="toggleCluePanel()">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
        <path d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/>
      </svg>
      <span class="folder-badge" id="folder-badge" style="display:none;"></span>
    </button>

    <input id="msg-input" type="text" placeholder="메시지를 입력하세요…" />
    <button id="send-btn" onclick="sendMsg()">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
    </button>
  </div>

<!-- ── 치키 토스트 ── -->
<div id="chiki-toast">🐰 그 이름을 알고 있어…</div>

<!-- ── 치키 팝업 ── -->
<div id="chiki-overlay" onclick="closeChiki()"></div>
<div id="chiki-popup">
  <!-- 토끼 이미지 (상자 없는 버전으로 교체 예정) -->
  <img id="chiki-popup-rabbit"
    src="https://res.cloudinary.com/dqu0dyn5k/image/upload/v1778657520/chiki_chat_popup_kprntg.png"
    alt="치키">
  <!-- HTML로 만든 텍스트 박스 -->
  <div id="chiki-popup-box">
    <div id="chiki-popup-title">치키의 알림</div>
    <div id="chiki-popup-inner">
      <div id="chiki-popup-text"></div>
    </div>
    <button id="chiki-popup-close" onclick="closeChiki()">닫기</button>
  </div>
</div>

  <!-- ── 사망 오버레이 ── -->
  <div id="death-overlay">
    <div class="death-text">사 &nbsp; 망</div>
    <div class="loop-reset-text">LOOP RESET</div>
  </div>

  <!-- ── 게임 오버 오버레이 ── -->
  <div id="game-over-overlay">
    <div class="game-over-text">GAME &nbsp; OVER</div>
    <div class="game-over-sub">더 이상 루프가 없습니다</div>
  </div>

</div>
<script src="/frontend/js/clue.js"></script>
<script src="/frontend/js/chat.js"></script>
</body>
</html>
