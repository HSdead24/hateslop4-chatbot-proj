<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>죽기 24시간 전에</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/frontend/css/buttonroom.css">
</head>
<body>

<!-- ── 전역 연출 레이어 ── -->
<div class="atmo-layer"></div>
<div class="scanlines"></div>
<div class="vignette"></div>
<div class="flash-overlay" id="flashOverlay"></div>

<div class="game-wrapper">

  <!-- TOP BAR -->
  <header class="top-bar">
    <div class="loop-box">
      <span class="loop-top">LOOP</span>
      <span class="loop-num">1</span>
      <span class="loop-inf">&infin;</span>
      <span class="loop-bot">루프 정보</span>
    </div>

    <div class="game-title">죽기 <span class="red">24시간</span> 전에</div>

    <div class="timer-block">
      <div class="timer-digits" id="timerDisplay">00:47:12</div>
      <div class="timer-label">남은 시간</div>
    </div>


  </header>

  <!-- LOCATION BAR -->
  <div class="location-bar">
    <div class="loc-left">
      <span class="loc-pin">📍</span>
      <div>
        <div class="loc-name">현관 앞</div>
        <div class="loc-sub">현재 위치</div>
      </div>
    </div>
    <div class="loc-right">
      <div class="loc-place-name">
        <div class="name">안식 정신건강의학과</div>
        <div class="sub">장소 정보</div>
      </div>
      <div class="loc-building">🏥</div>
    </div>
  </div>

  <!-- SCENE -->
  <div class="scene-container" id="sceneContainer">
    <div class="scene-bg"></div>

    <!-- 배경 이미지 레이어 -->
    <img class="scene-bg-image" id="sceneBgImage" src="" alt="" style="display:none;">

    <!-- 실제 이미지 (백엔드 연동 시 src 채워짐) -->
    <img class="scene-image" id="sceneImage" src="" alt="">

    <!-- 피 방울 장식 (JS가 동적으로 생성) -->
    <div class="drip-container" id="dripContainer"></div>


    <div class="scene-left-mist"></div>
    <div class="scene-top-fade"></div>
    <div class="scene-fade"></div>



    <!-- DIALOGUE + CHOICES wrapper: scene 하단에 고정 -->
    <div class="bottom-panel">
      <div class="dialogue-section">
        <div class="speaker-row">
          <span class="speaker-name" id="speakerName">박도원</span>
          <div class="speaker-dot"></div>
          <span class="speaker-role" id="speakerRole">택배 기사</span>
        </div>
        <div class="dialogue-text" id="dialogueText">
          선생님... 택배 왔습니다.<br>늦은 시간에 죄송합니다.
        </div>
      </div>
      <!-- CHOICES (JS가 동적으로 버튼 생성) -->
      <div class="choices-section" id="choicesSection"></div>
    </div>

  </div><!-- /scene-container -->

  <!-- BOTTOM HINT -->
  <div class="bottom-hint">
    <span class="hint-arrow">▾</span>
    <span class="hint-text">선택을 통해 스토리가 진행됩니다.</span>
  </div>

  <!-- 이벤트 팝업 (전화/문자/초인종 등) + location 변경 팝업 -->
  <div class="event-popup" id="eventPopup" data-type="event">
    <div class="event-popup-inner">
      <div class="event-icon" id="eventIcon">📞</div>
      <div class="event-label" id="eventLabel">전화</div>
      <div class="event-sublabel" id="eventSublabel" style="display:none;"></div>
    </div>
  </div>

</div><!-- /game-wrapper -->

<!-- 이미지 팝업 오버레이 (popup_img 씬용) -->
<div class="img-popup-overlay" id="imgPopupOverlay">
  <div class="img-popup-card">
    <img class="img-popup-img" id="imgPopupImg" src="" alt="">
    <div class="img-popup-placeholder" id="imgPopupPlaceholder">이미지 준비 중</div>
    <button class="img-popup-close" id="imgPopupClose">닫기</button>
  </div>
</div>

<!-- 단서 획득 오버레이 (game-wrapper 밖에 위치해야 fixed가 정상 동작) -->
<div class="clue-reveal-overlay" id="clueRevealOverlay">
  <div class="clue-reveal-card">
    <div class="clue-reveal-label">단서 획득!</div>
    <img class="clue-reveal-img" id="clueRevealImg" src="" alt="">
    <div class="clue-reveal-info">
      <div class="clue-reveal-title" id="clueRevealTitle"></div>
      <div class="clue-reveal-desc" id="clueRevealDesc"></div>
    </div>
    <button class="clue-reveal-btn" id="clueRevealBtn">확인</button>
  </div>
</div>

<script src="/frontend/js/clue.js"></script>
<script src="/frontend/js/button.js"></script>
</body>
</html>
